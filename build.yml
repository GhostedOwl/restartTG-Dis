name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: Restarter
  PY_VER: '3.11'
  FPM_MAINTAINER: ""
  FPM_DESCRIPTION: "Restarter for Telegram and Discord"

jobs:

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PY_VER }}

      - name: Install dependencies
        run: python -m pip install --upgrade pip setuptools wheel && python -m pip install customtkinter pystray pillow pyinstaller

      - name: Build exe
        run: pyinstaller --onefile --windowed --name ${{ env.APP_NAME }} restarter.py

      - name: Upload artifact (.exe)
        uses: actions/upload-artifact@v4
        with:
          name: Restarter-windows
          path: dist/${{ env.APP_NAME }}.exe

  build-deb:
    runs-on: ubuntu-22.04
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PY_VER }}

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk libappindicator3-dev ruby ruby-dev build-essential

      - name: Install Python deps
        run: python -m pip install --upgrade pip setuptools wheel && python -m pip install customtkinter pystray pillow pyinstaller

      - name: Install fpm
        run: sudo gem install --no-document fpm

      - name: Build binary
        run: pyinstaller --onefile --windowed --name ${{ env.APP_NAME }} --collect-all customtkinter restarter.py

      - name: Prepare package layout
        run: |
          rm -rf pkg
          mkdir -p pkg/usr/local/bin
          cp dist/${{ env.APP_NAME }} pkg/usr/local/bin/${{ env.APP_NAME }}
          chmod +x pkg/usr/local/bin/${{ env.APP_NAME }}

      - name: Build .deb with fpm
        run: |
          fpm -s dir -t deb \
            -n ${{ env.APP_NAME }} \
            -v "${{ env.VERSION }}" \
            --maintainer "${{ env.FPM_MAINTAINER }}" \
            --description "${{ env.FPM_DESCRIPTION }}" \
            --prefix / \
            -C pkg .

      - name: Move .deb to dist and upload
        run: |
          mkdir -p dist/packages
          mv *.deb dist/packages/${{ env.APP_NAME }}-${{ env.VERSION }}.deb

      - name: Upload artifact (.deb)
        uses: actions/upload-artifact@v4
        with:
          name: Restarter-linux-deb
          path: dist/packages/${{ env.APP_NAME }}-${{ env.VERSION }}.deb

  build-rpm-rhel:
    runs-on: ubuntu-22.04
    container: rockylinux:9
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (inside container)
        run: |
          dnf install -y python3 python3-pip python3-tkinter gcc ruby ruby-devel make rpm-build
          dnf clean all

      - name: Install Python deps
        run: python3 -m pip install --upgrade pip setuptools wheel && python3 -m pip install customtkinter pystray pillow pyinstaller

      - name: Install fpm
        run: gem install --no-document fpm

      - name: Build binary
        run: pyinstaller --onefile --windowed --name ${{ env.APP_NAME }}-rhel --collect-all customtkinter restarter.py

      - name: Prepare package layout
        run: |
          rm -rf pkg
          mkdir -p pkg/usr/local/bin
          cp dist/${{ env.APP_NAME }}-rhel pkg/usr/local/bin/${{ env.APP_NAME }}
          chmod +x pkg/usr/local/bin/${{ env.APP_NAME }}

      - name: Build .rpm with fpm
        run: |
          fpm -s dir -t rpm \
            -n ${{ env.APP_NAME }} \
            -v "${{ env.VERSION }}" \
            --maintainer "${{ env.FPM_MAINTAINER }}" \
            --description "${{ env.FPM_DESCRIPTION }}" \
            --prefix / \
            -C pkg .

      - name: Move .rpm to dist and upload
        run: |
          mkdir -p dist/packages
          mv *.rpm dist/packages/${{ env.APP_NAME }}-${{ env.VERSION }}.rpm

      - name: Upload artifact (.rpm for RHEL)
        uses: actions/upload-artifact@v4
        with:
          name: Restarter-linux-rhel
          path: dist/packages/${{ env.APP_NAME }}-${{ env.VERSION }}.rpm

  build-rpm-opensuse:
    runs-on: ubuntu-22.04
    container: opensuse/tumbleweed
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (inside container)
        run: |
          zypper refresh
          zypper install -y python3 python3-pip python3-tk python3-devel gcc ruby ruby-devel make rpm-build || true

      - name: Create venv and install Python deps
        run: |
          python3 -m venv /tmp/build_env
          source /tmp/build_env/bin/activate
          pip install --upgrade pip setuptools wheel
          pip install customtkinter pystray pillow pyinstaller

      - name: Install fpm
        run: |
          gem install --no-document fpm

      - name: Build binary
        run: |
          source /tmp/build_env/bin/activate
          pyinstaller --onefile --windowed --name ${{ env.APP_NAME }}-opensuse --collect-all customtkinter restarter.py

      - name: Prepare package layout
        run: |
          rm -rf pkg
          mkdir -p pkg/usr/local/bin
          cp dist/${{ env.APP_NAME }}-opensuse pkg/usr/local/bin/${{ env.APP_NAME }}
          chmod +x pkg/usr/local/bin/${{ env.APP_NAME }}

      - name: Build .rpm with fpm (openSUSE)
        run: |
          fpm -s dir -t rpm \
            -n ${{ env.APP_NAME }} \
            -v "${{ env.VERSION }}" \
            --maintainer "${{ env.FPM_MAINTAINER }}" \
            --description "${{ env.FPM_DESCRIPTION }}" \
            --prefix / \
            -C pkg .

      - name: Move .rpm to dist and upload
        run: |
          mkdir -p dist/packages
          mv *.rpm dist/packages/${{ env.APP_NAME }}-opensuse-${{ env.VERSION }}.rpm

      - name: Upload artifact (.rpm for openSUSE)
        uses: actions/upload-artifact@v4
        with:
          name: Restarter-linux-opensuse
          path: dist/packages/${{ env.APP_NAME }}-opensuse-${{ env.VERSION }}.rpm

  release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-deb, build-rpm-rhel, build-rpm-opensuse]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            artifacts/Restarter-windows/Restarter.exe
            artifacts/Restarter-linux-deb/Restarter-${{ github.ref_name }}.deb
            artifacts/Restarter-linux-rhel/Restarter-${{ github.ref_name }}.rpm
            artifacts/Restarter-linux-opensuse/Restarter-opensuse-${{ github.ref_name }}.rpm

