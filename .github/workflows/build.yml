name: Build
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # важно для создания релиза

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Windows
        run: echo "Сборка Windows..."

  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build DEB
        run: echo "Сборка DEB..."

  build-rpm-rhel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build RPM RHEL
        run: echo "Сборка RPM RHEL..."

  build-rpm-opensuse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build RPM openSUSE
        run: echo "Сборка RPM openSUSE..."

  release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-deb, build-rpm-rhel, build-rpm-opensuse]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}   # теперь явно указан
          files: |
            artifacts/BotRestarter-windows/BotRestarter.exe
            artifacts/BotRestarter-linux-deb/BotRestarter
            artifacts/BotRestarter-linux-rhel/BotRestarter-rhel
            artifacts/BotRestarter-linux-opensuse/BotRestarter-opensuse

