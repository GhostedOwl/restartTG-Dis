name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:

  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -q

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install customtkinter pystray pillow pyinstaller

      - name: Build
        run: pyinstaller --onefile --windowed --name Restarter restarter.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Restarter-windows
          path: dist/Restarter.exe

  build-deb:
    needs: test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk libappindicator3-dev

      - name: Install dependencies
        run: pip install customtkinter pystray pillow pyinstaller

      - name: Build
        run: pyinstaller --onefile --windowed --name Restarter --collect-all customtkinter restarter.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Restarter-linux-deb
          path: dist/Restarter

  build-rpm-rhel:
    needs: test
    runs-on: ubuntu-22.04
    container: rockylinux:9
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          dnf install -y python3 python3-pip python3-tkinter gcc

      - name: Install dependencies
        run: pip3 install customtkinter pystray pillow pyinstaller

      - name: Build
        run: pyinstaller --onefile --windowed --name Restarter-rhel --collect-all customtkinter restarter.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Restarter-linux-rhel
          path: dist/Restarter-rhel

  build-rpm-opensuse:
    needs: test
    runs-on: ubuntu-22.04
    container: opensuse/tumbleweed
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          zypper install -y python3 python3-pip python3-tk python3-devel gcc
          zypper install -y libayatana-appindicator3-1 libayatana-appindicator3-devel || true

      - name: Install dependencies
        run: |
          python3 -m venv /tmp/build_env
          source /tmp/build_env/bin/activate
          pip install --upgrade pip setuptools wheel
          pip install customtkinter pystray pillow pyinstaller

      - name: Build
        run: |
          source /tmp/build_env/bin/activate
          pyinstaller --onefile --windowed --name Restarter-opensuse --collect-all customtkinter restarter.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Restarter-linux-opensuse
          path: dist/Restarter-opensuse

  release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-deb, build-rpm-rhel, build-rpm-opensuse]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            artifacts/Restarter-windows/Restarter.exe
            artifacts/Restarter-linux-deb/Restarter
            artifacts/Restarter-linux-rhel/Restarter-rhel
            artifacts/Restarter-linux-opensuse/Restarter-opensuse
